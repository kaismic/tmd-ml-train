x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  image: tmd-tcct-pipeline:latest  # Forces Docker to build ONE image and reuse it
  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./models:/app/models
  environment:
    - PYTHONUNBUFFERED=1
  tty: true
  stdin_open: true

services:
  # ── Dev container ────────────────────────────────────────────────────────────
  # Used by .devcontainer/devcontainer.json. No entrypoint so VS Code can attach
  # to a long-running shell without triggering a pipeline step.
  dev:
    <<: *common-config
    volumes:
      - .:/app
    command: sleep infinity

  # ── Pipeline steps ───────────────────────────────────────────────────────────
  extract:
    <<: *common-config
    profiles:
      - extract
    entrypoint: ["python", "preprocess.py", "--extract"]

  clean:
    <<: *common-config
    profiles:
      - clean
    entrypoint: ["python", "preprocess.py", "--clean"]

  transform:
    <<: *common-config
    profiles:
      - transform
    entrypoint: ["python", "preprocess.py", "--transform"]

  preprocess:
    <<: *common-config
    profiles:
      - preprocess
    entrypoint: ["python", "preprocess.py", "--all"]

  train:
    <<: *common-config
    profiles:
      - train
    entrypoint: ["python", "train.py"]
